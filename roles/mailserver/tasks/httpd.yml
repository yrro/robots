- name: validate mod_md authority
  assert:
    that: mod_md_authority in ["staging", "production"]

- name: configure apache
  template:
    src: httpd/{{ item }}.j2
    dest: /etc/httpd/conf.d/{{ item }}
    mode: 0644
    owner: root
    group: root
  notify: 'mailserver : reload apache'
  loop:
  - md.conf
  - ~mta-sts.conf

- name: create mta-sts content directories
  file:
    path: /srv/www/{{ item }}
    state: directory
    mode: 0755
    owner: root
    group: root
    setype: _default
  loop:
  - ''
  - mta-sts
  - mta-sts/html
  - mta-sts/html/.well-known

- name: create mta-sts policy file
  copy:
    src: httpd/mta-sts.txt
    dest: /srv/www/mta-sts/html/.well-known/
    mode: 0644
    owner: root
    group: root

- name: configure gssproxy for apache
  copy:
    src: files/httpd/gssproxy.conf
    dest: /etc/gssproxy/80-httpd.conf
    mode: 0600
    owner: root
    group: root
  notify: 'mailserver : reload gssproxy'

- name: create keytab for md-challenge-dns script
  shell:
    cmd: |
      export KRB5CCNAME=$(mktemp) && kinit -V -k host/{{ inventory_hostname }} && ipa-getkeytab -p host/mail0.acme-challenge.ipa.robots.org.uk -k /etc/gssproxy/acme-challenge.keytab && kdestroy
    creates: /etc/gssproxy/acme-challenge.keytab

- name: md-challenge keytab permissions
  file:
    path: /etc/gssproxy/acme-challenge.keytab
    mode: 0600
    owner: root
    group: root

- name: allow apache to make network connections
  seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true

- name: create apache script directory
  file:
    path: /usr/local/libexec/httpd
    state: directory
    mode: 0755
    owner: root
    group: root

- name: install mod_md integration scripts
  copy:
    src: httpd/{{ item }}.py
    dest: /usr/local/libexec/httpd/{{ item }}
    mode: 0755
    owner: root
    group: root
  loop:
  - md-challenge-dns
  - md-message

- name: allow apache to start start md-message-renewed2.service
  copy:
    src: httpd/apache-md-message.rules
    dest: /etc/polkit-1/rules.d
    mode: 0644
    owner: root
    group: root

- name: install selinux policy module to allow apache to start systemd services
  include_role:
    name: selinux_policy
  vars:
    module_src: httpd/md-message.cil
    state: present

- name: create systemd services to invoke md-message
  copy:
    src: httpd/{{ item }}
    dest: /etc/systemd/system
    mode: 0644
    owner: root
    group: root
  notify: 'mailserver : systemctl daemon-reload'
  loop:
  - md-message-renewed2.service
  - md-message-installed2@.service

# mod_md may renew certificates as soon as it starts
- meta: flush_handlers

- name: create mta-sts vhost log directories
  file:
    path: /var/log/httpd/mta-sts.{{ item }}
    state: directory
    mode: 0700
    owner: root
    group: root
  loop: '{{ mta_sts_domains }}'

- name: check apache config
  command: apachectl configtest
  check_mode: false
  changed_when: false

- name: start/enable httpd
  systemd_service:
    name: httpd.service
    state: started
    enabled: true

- name: allow https through firewall
  firewalld:
    service: https
    state: enabled
    permanent: true
    immediate: true
