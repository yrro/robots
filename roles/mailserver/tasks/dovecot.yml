- name: recon mailstore user
  user:
    name: mailstore
  register: _mailserver_dovecot_mailstore_user

- name: configure dovecot
  template:
    src: dovecot/local.conf.j2
    dest: /etc/dovecot/local.conf
    mode: 0644
    owner: root
    group: root
  notify: 'mailserver : reload dovecot'

- name: configure dovecot ldap
  template:
    src: dovecot/ldap.conf.ext.j2
    dest: /etc/dovecot/ldap.conf.ext
    mode: 0640
    owner: root
    group: dovecot
  notify: 'mailserver : reload dovecot'

- name: disable dovecot system authentication
  replace:
    path: /etc/dovecot/conf.d/10-auth.conf
    regexp: ^(!include auth-system.conf\.ext)
    replace: '#\1'

- name: create dovecot sieve script directory
  file:
    path: /etc/dovecot/sieve
    state: directory
    mode: 0755
    owner: root
    group: root

- name: configure dovecot sieve scripts
  include_tasks: dovecot-sieve.yml
  loop:
  - on-move.sieve
  - spam.sieve
  loop_control:
    loop_var: script

- name: check dovecot config
  shell: doveadm config > /dev/null
  check_mode: false
  changed_when: false

- name: create dovecot utility script directory
  file:
    path: /usr/local/libexec/dovecot
    state: directory
    mode: 0755
    owner: root
    group: root

- name: create dovecot dsync-server wrapper
  copy:
    src: dovecot/wrap-dsync-server.sh
    dest: /usr/local/libexec/dovecot/wrap-dsync-server
    mode: 0755
    owner: root
    group: root

- name: create dovecot sieve pipe script directory
  file:
    path: /usr/local/libexec/dovecot/sieve
    state: directory
    mode: 0755
    owner: root
    group: root

- name: install dovecot sieve pipe script
  copy:
    src: dovecot/{{ item }}
    dest: /usr/local/libexec/dovecot/sieve/{{ (item | splitext)[0] }}
    mode: 0755
    owner: root
    group: root
  loop:
  - rspamd-report.sh

- name: flush handlers
  meta: flush_handlers

- name: (re)start dovecot
  systemd_service:
    name: dovecot.service
    #state: '{{ _mailserver_dovecot_gssproxy.changed | ternary("restarted", "started") }}'
    state: started
    enabled: yes

- name: configure gssproxy for dovecot
  copy:
    src: dovecot/gssproxy.conf
    dest: /etc/gssproxy/80-dovecot.conf
    mode: 0600
    owner: root
    group: root
  notify: 'mailserver : reload gssproxy'

- name: create keytab for dovecot
  shell:
    cmd: |
      export KRB5CCNAME=$(mktemp) && kinit -V -k host/{{ inventory_hostname }} && ipa-getkeytab -p imap/imap.robots.org.uk -k /etc/gssproxy/imap.keytab && kdestroy
    creates: /etc/gssproxy/imap.keytab

- name: md-challenge keytab permissions
  file:
    path: /etc/gssproxy/imap.keytab
    mode: 0600
    owner: root
    group: root

- name: create dovecot's own copy of the keytab
  copy:
    remote_src: true
    src: /etc/gssproxy/imap.keytab
    dest: /etc/dovecot/imap.keytab
    mode: 0640
    owner: root
    group: dovecot
