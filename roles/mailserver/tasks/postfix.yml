- include_tasks: postfix-postconf.yml
  loop: "{{ postfix_config | dict2items }}"

- name: check postconf(5)
  shell: postconf > /dev/null
  check_mode: false
  changed_when: false

- name: configure ldap_table for virtual_mailbox_domains
  template:
    src: postfix/ldap_table.cf.j2
    dest: /etc/postfix/ldap-domains.cf
    mode: 0640
    owner: root
    group: postfix
  vars:
    search_base: mailDomainName=%s,cn=mail,dc=ipa,dc=robots,dc=org,dc=uk
    query_filter: objectClass=mailDomain
    result_attribute: mailDomainName

- name: configure ldap_table for virtual_alias_maps
  template:
    src: postfix/ldap_table.cf.j2
    dest: /etc/postfix/ldap-aliases.cf
    mode: 0640
    owner: root
    group: postfix
  vars:
    search_base: mail=%s,cn=mail,dc=ipa,dc=robots,dc=org,dc=uk
    query_filter: objectClass=mailAlias
    result_attribute: mailRoutingAddress

- name: configure local alias for root
  lineinfile:
    line: 'root:    sam@robots.org.uk'
    path: /etc/aliases
    state: present
    regexp: '^#root:'
    insertafter: EOF

- name: stat /etc/aliases
  stat:
    path: /etc/aliases
  register: _mailserver_aliases

- name: stat aliases db
  stat:
    path: /etc/aliases.lmdb
  register: _mailserver_aliases_db

- name: rebuild aliases db
  command: newaliases
  when: |
    not _mailserver_aliases_db.stat.exists
    or _mailserver_aliases.stat.mtime > _mailserver_aliases_db.stat.mtime

- name: start postfix
  systemd_service:
    name: postfix.service
    state: started
    enabled: true
