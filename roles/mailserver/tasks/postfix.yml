# {{{  postconf(5)
- name: recon postconf(5)
  command: postconf -p
  check_mode: false
  changed_when: false
  register: _mailserver_postfix_postconf

- name: parse postconf(5)
  set_fact:
    postfix_postconf: >-
      {{
        dict(
          _mailserver_postfix_postconf.stdout_lines
          | map('split', '=', 1)
          | map('map', 'trim')
          | list
        )
      }}

- name: figure postconf(5) changes
  set_fact:
    _postfix_postconf_edit_args: >-
      {{
        (_postfix_postconf_edit_args | default([]))
        + (
            [item.key ~ "=" ~ item.value]
            if item.value is not none
              and (item.value | string) != (postfix_postconf.get(item.key))
            else []
          )
      }}
    _postfix_postconf_unset_args: >-
      {{
        (_postfix_postconf_unset_args | default([]))
        + (
          [item.key]
          if item.value is none
          else []
        )
      }}
  loop: "{{ postfix_config | dict2items }}"

- name: edit postconf(5) values
  command:
    argv: "{{ ['postconf', '-ep'] + _postfix_postconf_edit_args }}"
  when: _postfix_postconf_edit_args | default([]) | length > 0
  register: _postfix_postconf_e

- name: unset postconf(5) values
  command:
    argv: "{{ ['postconf', '-Xp'] + _postfix_postconf_unset_args }}"
  when: _postfix_postconf_unset_args | default([]) | length > 0
  register: _postfix_postconf_X

- name: reload postconf(5)
  command: postfix reload
  when: _postfix_postconf_e.changed or _postfix_postconf_X.changed
# }}}

# {{{ ldap lookups
- name: configure ldap_table for virtual_mailbox_domains
  template:
    src: postfix/ldap_table.cf.j2
    dest: /etc/postfix/ldap-domains.cf
    mode: 0640
    owner: root
    group: postfix
  vars:
    search_base: mailDomainName=%s,cn=mail,dc=ipa,dc=robots,dc=org,dc=uk
    query_filter: objectClass=mailDomain
    result_attribute: mailDomainName

- name: configure ldap_table for virtual_alias_maps
  template:
    src: postfix/ldap_table.cf.j2
    dest: /etc/postfix/ldap-aliases.cf
    mode: 0640
    owner: root
    group: postfix
  vars:
    search_base: mail=%s,cn=mail,dc=ipa,dc=robots,dc=org,dc=uk
    query_filter: objectClass=mailAlias
    result_attribute: mailRoutingAddress
# }}}

# {{{ /etc/aliases
- name: configure local alias for root
  lineinfile:
    line: 'root:    sam@robots.org.uk'
    path: /etc/aliases
    state: present
    regexp: '^#root:'
    insertafter: EOF

- name: stat /etc/aliases
  stat:
    path: /etc/aliases
  register: _mailserver_aliases

- name: stat aliases db
  stat:
    path: /etc/aliases.lmdb
  register: _mailserver_aliases_db

- name: rebuild aliases db
  command: newaliases
  when: |
    not _mailserver_aliases_db.stat.exists
    or _mailserver_aliases.stat.mtime > _mailserver_aliases_db.stat.mtime
# }}}

- name: start postfix
  systemd_service:
    name: postfix.service
    state: started
    enabled: true

