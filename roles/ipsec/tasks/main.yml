- import_tasks: packages.yml
- import_tasks: crypto-policy.yml
  when: ansible_facts.distribution_major_version|int >= 9
- import_tasks: hostkey.yml
- name: configure connections
  include_tasks: connection.yml
  loop: '{{ ipsec | dict2items }}'
  loop_control:
    loop_var: conn
  when: ipsec is defined
  register: _ipsec_connections
- name: restart ipsec
  systemd_service:
    name: ipsec
    state: restarted
  when: _ipsec_connections.results | map(attribute='changed') is any
...
