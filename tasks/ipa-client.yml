- name: install ipa-client packages
  package:
    name: '{{ item }}'
    state: present
  tags: slow
  loop:
  - ipa-client
  - libuser

- name: install ipa-client scripts
  copy:
    src: files/ipa-client/akinit.py
    dest: /usr/local/bin/akinit
    mode: 0755
    owner: root
    group: root

- name: recon IPA client configured
  command:
    argv:
    - python3
    - -c
    - |
      from ipalib.facts import is_ipa_client_configured
      print(int(is_ipa_client_configured()))
  check_mode: false
  changed_when: false
  register: ipa_client_configured

- name: join host to domain
  when: not (ipa_client_configured.stdout | bool)
  block:
  - name: provide IPA CA certificate
    copy:
      src: /etc/ipa/ca.crt
      dest: /tmp/ipa-ca.crt

  - name: set host {{ inventory_hostname }} one-time password
    command: ipa host-mod {{ inventory_hostname }} --random --raw
    register: _ipa_client_otp_raw
    delegate_to: localhost
    become: false

  - name: extract host {{ inventory_hostname }} one-time password
    set_fact:
      _ipa_client_otp: "{{ (_ipa_client_otp_raw.stdout_lines | select('match', '^\\s*randompassword:') | first | split(':'))[1] | trim }}"

  - name: ipa-client-install
    command:
      argv:
      - ipa-client-install
      - --unattended
      - --ca-cert-file=/tmp/ipa-ca.crt
      - --domain=ipa.robots.org.uk
      - --hostname={{ inventory_hostname }}
      - --password={{ _ipa_client_otp }}
      - --no-ntp

  - name: etckeeper commit
    command: etckeeper commit -m ipa-client-install

- name: recon ansible user disposition
  shell: getent passwd --service=files $(id -u)
  become: false
  check_mode: false
  changed_when: false
  failed_when: false
  register: _ipa_client_ansible_user_disposition

# Can't use 'meta: end_host' because it only affects the current play; we
# want to stop subsequent plays as well, so we must deliberately fail the
# whole run.
- name: end of play, subsequent runs should use domain authentication
  fail:
    msg: ipa-client-install was run, you must re-run the playbook using domain authentication
  when: _ipa_client_ansible_user_disposition.rc == 0

- name: recon authselect state
  command: authselect current
  check_mode: false
  changed_when: false
  register: _authselect_current_raw

- name: parse authselect state
  set_fact:
    authselect_current: '{{ _authselect_current_raw.stdout | from_yaml }}'

- name: assure authselect profile
  assert:
    that: authselect_current["Profile ID"] == "sssd"

- name: enable authselect profile feature
  command: authselect enable-feature {{ item }}
  when: item not in authselect_current['Enabled features']
  loop:
  - with-mkhomedir
  - with-subid
  - with-faillock
  - with-pwhistory
  - without-nullok

- name: configure pam_faillock
  lineinfile:
    path: /etc/security/faillock.conf
    line: '{{ item }}'
  loop:
  - local_users_only
  - deny = 6

- name: create remote-access group
  group:
    local: true
    name: remote-access
    state: present

- name: create remote-access PAM substack
  copy:
    content: |
      account [perm_denied=1 success=ignore] pam_localuser.so
      account required pam_succeed_if.so user ingroup remote-access
    dest: /etc/pam.d/remote-access
    mode: 0644
    owner: root
    group: root

- name: recon PAM services granting remote access
  stat:
    path: /etc/pam.d/{{ item }}
  register: _ipa_client_pam_remote_services_potential
  loop:
  - sshd
  - cockpit

- name: figure remote access services that exist
  set_fact:
    _ipa_client_pam_remote_services: '{{ _ipa_client_pam_remote_services_potential.results | selectattr("stat.exists", "true") | map(attribute="item") | list }}'

- name: check remote-access PAM substack for services granting remote access
  pamd:
    name: '{{ item }}'
    type: account
    control: include
    module_path: password-auth
    state: before
    new_type: account
    new_control: substack
    new_module_path: remote-access
  loop: '{{ _ipa_client_pam_remote_services }}'

