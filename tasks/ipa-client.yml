- name: install ipa-client
  package:
    name: ipa-client
    state: present
  tags: slow

- name: install ipa-client scripts
  copy:
    src: files/ipa-client/akinit.sh
    dest: /usr/local/bin/akinit
    mode: 0755
    owner: root
    group: root

- name: recon IPA client configured
  command:
    argv:
    - python3
    - -c
    - |
      from ipalib.facts import is_ipa_client_configured
      print(int(is_ipa_client_configured()))
  check_mode: false
  changed_when: false
  register: ipa_client_configured

- name: join host to domain
  when: not (ipa_client_configured.stdout | bool)
  block:
  - name: provide IPA CA certificate
    copy:
      src: /etc/ipa/ca.crt
      dest: /tmp/ipa-ca.crt

  - name: set host {{ inventory_hostname }} one-time password
    command: ipa host-mod {{ inventory_hostname }} --random --raw
    register: _ipa_client_otp_raw
    delegate_to: localhost
    become: false

  - name: extract host {{ inventory_hostname }} one-time password
    set_fact:
      _ipa_client_otp: "{{ (_ipa_client_otp_raw.stdout_lines | select('match', '^\\s*randompassword:') | first | split(':'))[1] | trim }}"

  - name: ipa-client-install
    command:
      argv:
      - ipa-client-install
      - --unattended
      - --ca-cert-file=/tmp/ipa-ca.crt
      - --domain=ipa.robots.org.uk
      - --hostname={{ inventory_hostname }}
      - --password={{ _ipa_client_otp }}
      - --no-ntp

  - name: end of play, subsequent runs should use domain authentication
    meta: end_host

