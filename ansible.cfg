[defaults]
inventory = hosts
interpreter_python = auto_silent
remote_tmp = /tmp
force_handlers = true
vault_id_match = true
vault_identity_list = robots-ansible@ipa-vault-client.py
timeout = 5

[inventory]
any_unparsed_is_failed = true

[privilege_escalation]
become = true
become_method = sudo
become_flags = -H -S -r unconfined_r

[connection]
pipelining = true

[ssh_connection]
use_tty = false
